<body>
  <p>Loading Form...</p>
<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbyoTVQYzM_mF6Om_XGiqS8E3N5fZkdDnk7yj_rszk2Ma6gIG63S0GzYf2vhfdlTbaJ6Iw/exec";

const formURL =
"https://docs.google.com/forms/d/1kJud7OqceQYu4-AR81xhWa1sl7Rncvoq9irg_UP4cis/viewform";


const params =
"?userAgent=" + encodeURIComponent(navigator.userAgent) +
"&language=" + encodeURIComponent(navigator.language) +
"&timezone=" + encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone) +
"&screenSize=" + encodeURIComponent(screen.width + "x" + screen.height);


const fullURL = scriptURL + params;

let logged = false;

function logVisit() {

  if (logged) return;
  logged = true;

  if (navigator.sendBeacon) {
    try {
      navigator.sendBeacon(fullURL);
      return;
    } catch(e) {}
  }

  try {
    fetch(fullURL, {mode:"no-cors"}).catch(()=>{});
    return;
  } catch(e) {}

  try {
    const img = new Image();
    img.src = fullURL;
  } catch(e) {}

}

logVisit();

setTimeout(function(){
  window.location.href = formURL;
}, 400);

</script>
