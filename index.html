<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Coaching Intake Form</title>

  <!-- Google Analytics 4 tracking code -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ELYQ58JY60"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    // Configure GA4
    gtag('config', 'G-ELYQ58JY60');
  </script>
</head>
<body>
  <p>Loading Intake Form...</p>

  <script>
    // Collect basic client info
    const userAgent = navigator.userAgent;
    const language = navigator.language;
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    const screenSize = screen.width + "x" + screen.height;

    // Send a custom GA4 event for form opens
    gtag('event', 'form_open', {
      'user_agent': userAgent,
      'language': language,
      'timezone': timezone,
      'screen_size': screenSize
    });

    // Redirect immediately to your Google Form
    setTimeout(() => {
      window.location.href = "https://docs.google.com/forms/d/1kJud7OqceQYu4-AR81xhWa1sl7Rncvoq9irg_UP4cis/viewform";
    }, 200); // 200ms delay ensures GA4 loads
  </script>
</body>
</html>
