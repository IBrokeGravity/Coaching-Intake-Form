<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coaching Intake Form</title>

  <!-- GA4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ELYQ58JY60"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ELYQ58JY60'); // Replace with your GA4 ID
  </script>
</head>
<body>
  <p>Loading Form...</p>

  <script>
    // Visitor info
    const userAgent = encodeURIComponent(navigator.userAgent);
    const language = encodeURIComponent(navigator.language);
    const timezone = encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone);
    const screenSize = encodeURIComponent(screen.width + "x" + screen.height);

    // Send GA4 event
    gtag('event', 'form_open', {
      'user_agent': decodeURIComponent(userAgent),
      'language': decodeURIComponent(language),
      'timezone': decodeURIComponent(timezone),
      'screen_size': decodeURIComponent(screenSize)
    });

    // Mobile-safe logging to Google Sheet
    const webAppUrl = "https://script.google.com/macros/s/AKfycbxwDCvJIqzJ9C8CTCNZ5Ubh1fsVhgat86rl40AGgpHXXdMEIWSiD42vNgGWxRd2H4_LXg/exec"; // Replace with your Apps Script URLL
    const urlWithParams = `${webAppUrl}?userAgent=${userAgent}&language=${language}&timezone=${timezone}&screenSize=${screenSize}`;

    // Use fetch but ensure it finishes before redirect
    fetch(urlWithParams)
      .finally(() => {
        // Redirect after logging completes
        window.location.href = "https://docs.google.com/forms/d/1kJud7OqceQYu4-AR81xhWa1sl7Rncvoq9irg_UP4cis/viewform";
      });

    // Fallback: in case fetch hangs (some mobile browsers block fetch)
    setTimeout(() => {
      window.location.href = "https://docs.google.com/forms/d/1kJud7OqceQYu4-AR81xhWa1sl7Rncvoq9irg_UP4cis/viewform";
    }, 1000); // 1 second fallback
  </script>
</body>
</html>
